<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaWall — Live Wallpaper Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/renderer/index.css">
</head>
<body>
  <div id="app">
    <!-- Title bar -->
    <div id="titlebar">
      <div class="titlebar-drag">
        <div class="titlebar-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2.5">
            <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#818cf8"/><stop offset="100%" style="stop-color:#c084fc"/></linearGradient></defs>
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span>NovaWall</span>
        </div>
      </div>
      <div class="titlebar-controls">
        <button id="btn-minimize" class="titlebar-btn" onclick="window.novawall.minimizeWindow()">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" rx="0.75" fill="currentColor"/></svg>
        </button>
        <button id="btn-maximize" class="titlebar-btn" onclick="window.novawall.maximizeWindow()">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button id="btn-close" class="titlebar-btn btn-close" onclick="window.novawall.closeWindow()">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Main layout -->
    <div id="main-layout">
      <!-- Sidebar -->
      <nav id="sidebar">
        <div class="sidebar-nav">
          <button class="nav-item active" data-page="home" id="nav-home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
          </button>
          <button class="nav-item" data-page="playlists" id="nav-playlists">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            <span>Playlists</span>
          </button>
          <button class="nav-item" data-page="favorites" id="nav-favorites">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            <span>Favorites</span>
          </button>
          <button class="nav-item" data-page="settings" id="nav-settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            <span>Settings</span>
          </button>
        </div>
        <div class="sidebar-footer">
          <div class="perf-indicator" id="perf-indicator">
            <div class="perf-dot"></div>
            <span>Idle</span>
          </div>
        </div>
      </nav>

      <!-- Content area -->
      <main id="content">
        <!-- Pages are injected here by JS -->
      </main>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal hidden">
      <div class="modal-backdrop" onclick="closePreview()"></div>
      <div class="modal-content preview-modal-content">
        <button class="modal-close" onclick="closePreview()">&times;</button>
        <div id="preview-player"></div>
        <div id="preview-info"></div>
      </div>
    </div>

    <!-- Import Modal -->
    <div id="import-modal" class="modal hidden">
      <div class="modal-backdrop" onclick="closeImportModal()"></div>
      <div class="modal-content import-modal-content">
        <h2>Import Wallpaper</h2>
        <div class="import-tabs">
          <button class="import-tab active" onclick="switchImportTab('file')">Local File</button>
          <button class="import-tab" onclick="switchImportTab('url')">From URL</button>
        </div>
        <div id="import-file-tab" class="import-tab-content">
          <div id="drop-zone" class="drop-zone">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Drag & drop wallpapers here</p>
            <span>or</span>
            <button class="btn btn-primary" onclick="browseFiles()">Browse Files</button>
            <small>Supports MP4, WebM, GIF, JPG, PNG</small>
          </div>
        </div>
        <div id="import-url-tab" class="import-tab-content hidden">
          <input type="url" id="import-url-input" class="input" placeholder="https://example.com/wallpaper.mp4">
          <button class="btn btn-primary" onclick="importFromUrl()" style="margin-top:12px;width:100%">Import</button>
        </div>
        <div id="import-options" class="import-options hidden">
          <label class="input-label">Name</label>
          <input type="text" id="import-name" class="input" placeholder="Wallpaper name">
          <label class="input-label">Category</label>
          <select id="import-category" class="input"></select>
          <button class="btn btn-primary" onclick="confirmImport()" style="margin-top:16px;width:100%">Add Wallpaper</button>
        </div>
      </div>
    </div>
  </div>

  <script src="src/renderer/app.js"></script>
  <script src="src/renderer/app-pages.js"></script>
</body>
</html>
